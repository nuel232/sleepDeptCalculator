<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Debt Calculator</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <h1>Sleep Debt Calculator</h1>
    <div id="calculator">
        <label for="monday">Monday: </label>
        <input type="number" id="monday" min="0" max="24" placeholder="0">
        <br><br>
        <label for="tuesday">Tuesday: </label>
        <input type="number" id="tuesday" min="0" max="24" placeholder="0">
        <br><br>
        <label for="wednesday">Wednesday: </label>
        <input type="number" id="wednesday" min="0" max="24" placeholder="0">
        <br><br>
        <label for="thursday">Thursday: </label>
        <input type="number" id="thursday" min="0" max="24" placeholder="0">
        <br><br>
        <label for="friday">Friday: </label>
        <input type="number" id="friday" min="0" max="24" placeholder="0">
        <br><br>
        <label for="saturday">Saturday: </label>
        <input type="number" id="saturday" min="0" max="24" placeholder="0">
        <br><br>
        <label for="sunday">Sunday: </label>
        <input type="number" id="sunday" min="0" max="24" placeholder="0">
        <br><br>
        <button onclick="calculateButton()">Calculate</button>
        <p id="result"></p>
    </div>

    <script src="Script.js"></script>
</body>
</html>
